<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Managerial Economics - Complete 120 Question Portal</title>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0;
            --primary: #3498db; --secondary: #27ae60; --danger: #e74c3c;
            --border: #333; --panel-bg: #252525; --hover: #2c2c2c;
        }
        [data-theme="light"] {
            --bg-color: #f8f9fa; --card-bg: #ffffff; --text-color: #2c3e50;
            --primary: #2980b9; --border: #ddd; --panel-bg: #f1f2f6; --hover: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.3s; }
        header { padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10; }
        main { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        #quiz-container { flex: 3; background: var(--card-bg); padding: 30px; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow-y: auto; position: relative; }
        .category-tag { font-size: 0.8rem; text-transform: uppercase; color: var(--primary); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
        .question-text { font-size: 1.25rem; line-height: 1.5; margin-bottom: 25px; }
        
        .options-grid { display: grid; gap: 12px; }
        .option-btn { padding: 15px 20px; border: 2px solid var(--border); border-radius: 8px; background: transparent; color: var(--text-color); text-align: left; cursor: pointer; transition: 0.2s; font-size: 1rem; display: flex; align-items: center; }
        .option-btn:hover:not(:disabled) { background: var(--hover); border-color: #555; }
        .option-btn.selected { border-color: var(--primary); background: rgba(52, 152, 219, 0.15); }
        .option-btn.correct { background: var(--secondary) !important; color: white !important; border-color: var(--secondary) !important; }
        .option-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        
        #reason-box { margin-top: 25px; padding: 15px 20px; background: rgba(52, 152, 219, 0.1); border-left: 5px solid var(--primary); border-radius: 4px; display: none; line-height: 1.5; font-size: 0.95rem; }
        
        #question-panel { flex: 1; background: var(--panel-bg); padding: 20px; border-radius: 12px; max-width: 320px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .panel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; overflow-y: auto; padding-right: 5px; flex: 1; align-content: start; }
        .panel-num { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 0.9rem; background: var(--card-bg); transition: 0.2s; font-weight: 500; }
        .panel-num:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .panel-num.active { border: 2px solid var(--primary); transform: scale(1.1); font-weight: bold; box-shadow: 0 0 10px rgba(52, 152, 219, 0.3); }
        
        /* Panel Status Colors */
        .panel-num.correct-panel { background: var(--secondary); color: white; border-color: var(--secondary); }
        .panel-num.wrong-panel { background: var(--danger); color: white; border-color: var(--danger); }

        .nav-controls { margin-top: auto; padding-top: 25px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.95rem; }
        .btn:hover { filter: brightness(1.1); }
        .btn-submit { background: var(--secondary); color: white; flex-grow: 1; }
        .btn-clear { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-clear:hover { background: rgba(231, 76, 60, 0.1); }
        
        .term-link { color: var(--primary); text-decoration: underline; cursor: help; position: relative; font-weight: 600; }
        .tooltip { visibility: hidden; width: 220px; background: #222; color: #fff; text-align: center; border-radius: 6px; padding: 10px; position: absolute; z-index: 100; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.2s; font-size: 0.85rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none; border: 1px solid #444; }
        .term-link:hover .tooltip { visibility: visible; opacity: 1; }
        
        #dashboard { display: none; position: fixed; inset: 0; background: var(--bg-color); padding: 40px 10%; overflow-y: auto; z-index: 2000; }
        .stat-card { background: var(--panel-bg); padding: 20px; border-radius: 10px; border-left: 5px solid; margin-bottom: 15px; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body data-theme="dark">

<header>
    <h2 style="margin:0; color: var(--primary);">ME Quiz Master</h2>
    <div style="display:flex; gap:30px; align-items:center;">
        <div style="font-size:1.2rem; font-weight:bold; background: var(--panel-bg); padding: 8px 15px; border-radius: 20px;">Score: <span id="score" style="color:var(--secondary)">0</span></div>
        <button onclick="toggleTheme()" class="btn" style="background:var(--panel-bg); color:var(--text-color); border: 1px solid var(--border);">🌓 Toggle Mode</button>
    </div>
</header>

<main>
    <div id="quiz-container">
        <div id="category" class="category-tag"></div>
        <div id="question" class="question-text"></div>
        <div id="options" class="options-grid"></div>
        <div id="reason-box"><strong>Reasoning:</strong> <span id="reason-text"></span></div>
        
        <div class="nav-controls">
            <button class="btn" style="background:#555; color:white;" onclick="move(-1)">◀ Previous</button>
            <button class="btn btn-clear" id="clear-btn" onclick="clearResp()">Clear Selection</button>
            <button class="btn btn-submit" id="submit-btn" style="display:none;" onclick="submitAns()">Submit Answer</button>
            <button class="btn" style="background:var(--primary); color:white;" onclick="move(1)">Next ▶</button>
            <button class="btn" style="background:var(--danger); color:white; margin-left:auto;" onclick="showResults()">Finish Quiz 🏁</button>
        </div>
    </div>
    
    <div id="question-panel">
        <h3 style="margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Question Navigator</h3>
        <div class="panel-grid" id="panel-grid"></div>
        <div style="margin-top:15px; font-size:0.8rem; opacity:0.8; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 6px;">
            <span style="color:var(--primary)">■</span> Active &nbsp;
            <span style="color:var(--secondary)">■</span> Correct &nbsp;
            <span style="color:var(--danger)">■</span> Wrong<br><br>
            * MSQs require selecting ALL correct answers before submitting.
        </div>
    </div>
</main>

<div id="dashboard">
    <h1 style="color: var(--primary); margin-bottom: 5px;">Performance Dashboard</h1>
    <p style="opacity: 0.8; margin-top: 0; margin-bottom: 30px;">Review your weak topics to improve your Managerial Economics proficiency.</p>
    
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
        <div style="background: var(--card-bg); padding: 30px; border-radius: 12px; border: 2px solid var(--primary); text-align: center; flex: 1;">
            <h3>Final Score</h3>
            <div id="final-stats" style="font-size: 3rem; font-weight: bold; color: var(--primary);"></div>
        </div>
    </div>

    <h2 style="border-bottom: 2px solid var(--border); padding-bottom: 10px;">Topic Analysis</h2>
    <div id="weak-areas" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-bottom: 40px;"></div>
    
    <button class="btn" style="background:var(--primary); color:white; padding: 15px 30px; font-size: 1.1rem; width: 100%;" onclick="location.reload()">Restart Quiz</button>
</div>

<script>
    const glossary = {
        "GDP": "Gross Domestic Product: The total market value of all final goods and services produced within a country.",
        "NDP": "Net Domestic Product: GDP minus the depreciation of capital assets.",
        "Oligopoly": "A market structure with a few dominant firms where mutual interdependence is high.",
        "Monopoly": "A market structure where a single seller controls the entire supply of a good or service.",
        "Monopolistic Competition": "Many firms selling differentiated products with relatively free entry and exit.",
        "Elasticity": "The measure of how responsive quantity demanded or supplied is to a change in price or income.",
        "Inflation": "A sustained increase in the general price level, eroding purchasing power.",
        "Deflation": "A sustained decrease in the general price level.",
        "Stagflation": "An economic anomaly combining stagnant growth, high unemployment, and high inflation.",
        "Isoquant": "A curve representing all combinations of inputs that yield the exact same level of output.",
        "Multiplier Effect": "The proportional amount of increase in final income that results from an injection of spending."
    };

    // --- FULL 120 QUESTION BANK EXTRACTED MANUALLY ---
    const questions = [
        // BATCH 1: MCQs
        { id: 1, type: "MCQ", cat: "Basics of ME", q: "Managerial economics bridges the gap between traditional economic theory and real-world business decision-making. Which of the following best describes its nature?", options: ["It is purely a positive science focused on 'what is.'", "It relies strictly on macroeconomic aggregates.", "It is a normative science focused on prescribing 'what should be' for optimal decision-making.", "It ignores historical data and focuses only on forecasting."], correct: [2], reason: "Managerial economics is prescriptive (normative) rather than purely descriptive (positive), as it helps managers determine the best course of action." },
        { id: 2, type: "MCQ", cat: "Elasticity", q: "Scenario: TechCorp recently reduced the price of its flagship software by 15%, which led to a 30% increase in quantity demanded. Simultaneously, the demand for their premium technical support service increased by 20%. The software and technical support service are:", options: ["Substitute goods with positive cross-price elasticity", "Complementary goods with negative cross-price elasticity", "Giffen goods with positive income elasticity", "Veblen goods with perfectly inelastic demand"], correct: [1], reason: "A price drop in software led to an increase in demand for support services. This inverse relationship indicates they are complementary goods." },
        { id: 3, type: "MCQ", cat: "Costs", q: "The cost that involves the value of the next best alternative forgone when a decision is made is known as:", options: ["Sunk Cost", "Historical Cost", "Opportunity Cost", "Implicit Cost"], correct: [2], reason: "Opportunity cost represents the benefits missed out on when choosing one alternative over another." },
        { id: 4, type: "MCQ", cat: "Elasticity", q: "If the price elasticity of demand for a luxury car is greater than 1 (elastic), a decrease in the car's price will result in:", options: ["A decrease in total revenue", "An increase in total revenue", "No change in total revenue", "A proportional decrease in quantity demanded"], correct: [1], reason: "When demand is elastic, consumers are highly responsive to price changes. A price drop increases total revenue." },
        { id: 5, type: "MCQ", cat: "Forecasting", q: "A new smartphone company wants to estimate the demand for a radically new foldable device that has no historical sales data. Which demand forecasting method is most appropriate?", options: ["Trend Projection Method", "Moving Average Method", "Delphi Method / Expert Opinion", "Time Series Analysis"], correct: [2], reason: "Statistical methods require historical data. For new products, qualitative methods like Delphi or expert opinion are necessary." },
        { id: 6, type: "MCQ", cat: "Demand", q: "If a consumer's income increases by 10% and their consumption of 'Brand X Instant Noodles' decreases by 5%, what type of good is Brand X?", options: ["Luxury Good", "Necessity Good", "Inferior Good", "Normal Good"], correct: [2], reason: "Inferior goods have a negative income elasticity. As income rises, consumers substitute them for higher-quality alternatives." },
        { id: 7, type: "MCQ", cat: "Production", q: "In the short run, the Law of Variable Proportions states that as more units of a variable input are added to fixed inputs:", options: ["Total production will immediately decrease.", "Marginal product will eventually decline.", "Average fixed cost will increase.", "Returns to scale will remain constant."], correct: [1], reason: "Adding more labor to a fixed factory size eventually leads to overcrowding, causing marginal product to fall." },
        { id: 8, type: "MCQ", cat: "Costs", q: "Which of the following curves is typically U-shaped in production cost theory?", options: ["Average Fixed Cost (AFC)", "Total Fixed Cost (TFC)", "Average Total Cost (ATC)", "Total Variable Cost (TVC)"], correct: [2], reason: "ATC is U-shaped because it initially falls as fixed costs spread over units, but eventually rises due to diminishing marginal returns." },
        { id: 9, type: "MCQ", cat: "Costs", q: "Sunk costs are defined as:", options: ["Costs that change with output.", "Costs already incurred and cannot be recovered.", "The opportunity cost of capital.", "Future costs that can be avoided."], correct: [1], reason: "Sunk costs are past expenses that cannot be refunded. Rational economic decisions should ignore them." },
        { id: 10, type: "MCQ", cat: "Production", q: "The expansion path in production theory illustrates:", options: ["Profit-maximizing output for different prices.", "The cheapest combination of inputs to produce various levels of output in the long run.", "Diminishing marginal utility.", "Inflation and unemployment relationship."], correct: [1], reason: "The expansion path connects tangency points between isocost lines and isoquants, showing least-cost input combinations." },
        { id: 11, type: "MCQ", cat: "Market Structures", q: "Scenario: 50 small cafes selling nearly identical coffee. No barriers to entry. If one cafe raises price by 10%, it loses almost all customers. Market structure:", options: ["Oligopoly", "Monopoly", "Perfect Competition", "Monopolistic Competition"], correct: [2], reason: "Many sellers, homogeneous products, no barriers, and being pure 'price takers' define perfect competition." },
        { id: 12, type: "MCQ", cat: "Oligopoly", q: "The 'Kinked Demand Curve' explains price rigidity in which market structure?", options: ["Perfect Competition", "Monopolistic Competition", "Oligopoly", "Monopsony"], correct: [2], reason: "Oligopolies assume competitors match price cuts but ignore increases, leading to price stability." },
        { id: 13, type: "MCQ", cat: "Pricing Policies", q: "A movie theater charges $15 for adults and $10 for students. This is an example of:", options: ["First-degree price discrimination", "Second-degree price discrimination", "Third-degree price discrimination", "Penetration pricing"], correct: [2], reason: "Third-degree price discrimination segments the market based on observable attributes like student status." },
        { id: 14, type: "MCQ", cat: "Market Structures", q: "In Monopolistic Competition, the long-run economic profit tends toward zero because:", options: ["Products are perfectly homogeneous.", "Firms operate at minimum average cost.", "There are high barriers to entry.", "Free entry and exit attract new competitors if short-run profits exist."], correct: [3], reason: "Profit attracts new entrants, increasing supply and driving prices down until economic profit reaches zero." },
        { id: 15, type: "MCQ", cat: "Market Structures", q: "The universal rule for profit maximization across all market structures is:", options: ["Price = Average Total Cost", "Marginal Revenue = Marginal Cost", "Total Revenue = Total Cost", "Price = Marginal Revenue"], correct: [1], reason: "Profit is maximized when the extra revenue from one more unit equals the extra cost of producing it (MR = MC)." },
        { id: 16, type: "MCQ", cat: "Macroeconomics", q: "Which transaction is INCLUDED in the calculation of Gross Domestic Product (GDP)?", options: ["Purchase of a used 2018 Toyota Camry.", "Value of volunteer work.", "Purchase of newly manufactured microchips by Dell as intermediate goods.", "Sale of a newly built house completed in the current year."], correct: [3], reason: "GDP only counts final goods and services produced within the year. Used goods and intermediate materials are excluded." },
        { id: 17, type: "MCQ", cat: "Macroeconomics", q: "Real GDP differs from Nominal GDP in that Real GDP:", options: ["Includes underground economy.", "Adjusts for changes in the price level (inflation).", "Excludes government spending.", "Only measures physical goods."], correct: [1], reason: "Real GDP uses base-year prices to factor out inflation, providing a true measure of economic growth." },
        { id: 18, type: "MCQ", cat: "Macroeconomics", q: "According to Keynes's psychological law of consumption:", options: ["Consumption increases by a smaller amount than the increase in income.", "Consumption increases by an amount greater than income.", "Consumption remains constant.", "Savings decrease as income rises."], correct: [0], reason: "Keynes theorized the Marginal Propensity to Consume (MPC) is less than 1. People spend a portion of new income and save the rest." },
        { id: 19, type: "MCQ", cat: "Macroeconomics", q: "Government injects $100M into infrastructure. Construction workers spend at restaurants, expanding total income by $400M. This is:", options: ["Accelerator Principle", "Multiplier Effect", "Crowding-Out Effect", "Demand-Pull Inflation"], correct: [1], reason: "The Multiplier Effect explains how an initial injection of spending leads to a much larger overall increase in national income." },
        { id: 20, type: "MCQ", cat: "Inflation", q: "What type of inflation is triggered by a sudden increase in the cost of raw materials (e.g., oil shock)?", options: ["Demand-Pull Inflation", "Cost-Push Inflation", "Hyperinflation", "Built-in Inflation"], correct: [1], reason: "Cost-push inflation occurs when production costs rise, forcing prices up regardless of consumer demand." },
        { id: 21, type: "MCQ", cat: "Business Cycles", q: "The phase of the business cycle characterized by declining real GDP and rising unemployment is:", options: ["Peak", "Trough", "Expansion", "Recession"], correct: [3], reason: "A recession is a period of temporary economic decline where trade and industrial activity are reduced." },
        { id: 22, type: "MCQ", cat: "Macroeconomics", q: "Frictional unemployment occurs when:", options: ["Machines replace workers", "The economy is in a recession", "Workers are temporarily between jobs", "Workers lack required skills"], correct: [2], reason: "Frictional unemployment is the natural, short-term unemployment while people search for jobs." },
        { id: 23, type: "MCQ", cat: "Welfare Economics", q: "Deadweight loss is primarily a measure of:", options: ["Market efficiency", "Market inefficiency", "Total revenue", "Consumer surplus"], correct: [1], reason: "Deadweight loss is the loss of economic efficiency occurring when free market equilibrium is not achieved." },
        { id: 24, type: "MCQ", cat: "Business Cycles", q: "Which of the following is considered a 'Leading Indicator' of the business cycle?", options: ["Unemployment duration", "Corporate profits", "Stock market indices", "Consumer Price Index"], correct: [2], reason: "Stock markets reflect future expectations of earnings, making them a leading indicator of economic shifts." },
        { id: 25, type: "MCQ", cat: "Market Structures", q: "In perfect competition, the firm's demand curve is:", options: ["Downward sloping", "Perfectly inelastic", "Perfectly elastic", "U-shaped"], correct: [2], reason: "A perfectly competitive firm is a price taker; it can sell all it wants at the market price, making its demand curve perfectly elastic." },
        { id: 26, type: "MCQ", cat: "Macroeconomics", q: "Net Factor Income from Abroad (NFIA) is used to calculate the difference between:", options: ["Nominal and Real GDP", "GDP and GNP", "Inflation and Deflation", "Exports and Imports"], correct: [1], reason: "Gross National Product (GNP) = Gross Domestic Product (GDP) + NFIA." },
        { id: 27, type: "MCQ", cat: "Market Structures", q: "A natural monopoly exists primarily because of:", options: ["Government patents", "Control over raw materials", "Massive economies of scale", "Aggressive advertising"], correct: [2], reason: "A natural monopoly occurs when fixed costs are so high that one firm can supply the market cheaper than multiple firms." },
        { id: 28, type: "MCQ", cat: "Inflation", q: "Deflation is defined as:", options: ["A decrease in the rate of inflation", "A sustained decrease in the general price level", "High unemployment", "A drop in GDP"], correct: [1], reason: "Deflation is a negative inflation rate, meaning money gains purchasing power over time." },
        { id: 29, type: "MCQ", cat: "Macroeconomics", q: "The GDP deflator measures:", options: ["Economic growth", "Unemployment", "The overall price level (Inflation)", "Interest rates"], correct: [2], reason: "The GDP deflator compares Nominal GDP to Real GDP to measure changes in the price level over time." },
        { id: 30, type: "MCQ", cat: "Macroeconomics", q: "Structural unemployment is caused by:", options: ["Economic recessions", "People voluntarily quitting", "A mismatch between workers' skills and job requirements", "Seasonal industry changes"], correct: [2], reason: "Structural unemployment happens when industries change (like automation) and workers lack the new skills required." },
        { id: 31, type: "MCQ", cat: "Production", q: "The Marginal Rate of Technical Substitution (MRTS) represents the slope of an:", options: ["Isoquant", "Isocost line", "Demand curve", "Indifference curve"], correct: [0], reason: "MRTS shows the rate at which one input can be substituted for another while keeping output constant on an isoquant." },
        { id: 32, type: "MCQ", cat: "Costs", q: "Economies of scale occur when:", options: ["Total fixed costs increase", "Long-run average total cost decreases as output increases", "Short-run marginal cost increases", "Output doubles when inputs are tripled"], correct: [1], reason: "Scaling up production makes each unit cheaper to produce on average in the long run." },
        { id: 33, type: "MCQ", cat: "Macroeconomics", q: "Which policy is considered Contractionary Fiscal Policy?", options: ["Decreasing taxes", "Increasing government spending", "Decreasing government spending and raising taxes", "Lowering interest rates"], correct: [2], reason: "Contractionary policy aims to cool down an overheating economy by reducing aggregate demand through spending cuts or tax hikes." },
        { id: 34, type: "MCQ", cat: "Macroeconomics", q: "Stagflation is defined as:", options: ["High growth, high inflation", "High unemployment, high inflation", "Deflation and high growth", "Zero inflation"], correct: [1], reason: "Stagflation occurs when the economy stagnates (high unemployment) but prices still rise (inflation)." },
        { id: 35, type: "MCQ", cat: "Production", q: "If doubling all inputs more than doubles total output, the firm is experiencing:", options: ["Increasing returns to scale", "Decreasing returns to scale", "Constant returns to scale", "Diminishing marginal returns"], correct: [0], reason: "Increasing returns to scale means output grows proportionally faster than inputs." },
        { id: 36, type: "MCQ", cat: "Inflation", q: "The 'shoe-leather cost' of inflation refers to:", options: ["Cost of printing new money", "Time and effort wasted trying to minimize cash holdings", "Cost to businesses of changing prices", "Increase in price of raw materials"], correct: [1], reason: "Shoe-leather costs refer to the metaphorical wear on shoes from making trips to the bank to avoid holding depreciating cash." },
        { id: 37, type: "MCQ", cat: "Inflation", q: "Menu costs are:", options: ["Costs of dining out", "Costs to firms of updating prices and catalogs", "Opportunity cost of capital", "Cost of imported goods"], correct: [1], reason: "Menu costs refer to the logistical costs a business incurs to change advertised prices during inflation." },
        { id: 38, type: "MCQ", cat: "Markets", q: "A price ceiling set below the equilibrium price will cause:", options: ["A surplus", "A shortage", "Market equilibrium", "Rightward shift in demand"], correct: [1], reason: "A price ceiling prevents price from rising to equilibrium, resulting in quantity demanded exceeding quantity supplied." },
        { id: 39, type: "MCQ", cat: "Oligopoly", q: "The Cournot model is used to analyze which type of market?", options: ["Monopoly", "Perfect Competition", "Oligopoly", "Monopsony"], correct: [2], reason: "The Cournot model describes an oligopoly where firms compete on the amount of output they produce." },
        { id: 40, type: "MCQ", cat: "Elasticity", q: "A perfectly inelastic demand curve is:", options: ["Horizontal", "Vertical", "Upward sloping", "U-shaped"], correct: [1], reason: "Vertical means quantity demanded does not change regardless of price changes." },
        
        // BATCH 1: MSQs
        { id: 41, type: "MSQ", cat: "Pricing Policies", q: "An airline knows business travelers have inelastic demand, vacationers elastic. Which strategies align to maximize revenue? (Select all)", options: ["Increase prices for last-minute business travelers.", "Offer discounts for vacationers booking in advance.", "Increase prices for vacationers.", "Keep prices uniform."], correct: [0, 1], reason: "Raise prices when demand is inelastic; lower them when elastic to maximize total revenue." },
        { id: 42, type: "MSQ", cat: "Costs", q: "Which of the following costs are considered 'Implicit Costs'? (Select all)", options: ["Monthly lease payment.", "Salary entrepreneur gave up by quitting their job.", "Wages to factory workers.", "Interest income forfeited by investing savings into business."], correct: [1, 3], reason: "Implicit costs are opportunity costs representing forgone income from resources already owned." },
        { id: 43, type: "MSQ", cat: "Oligopoly", q: "Core characteristics of an Oligopolistic market: (Select all)", options: ["Large number of small firms.", "Mutual interdependence among firms.", "High barriers to entry.", "Firms are pure price takers."], correct: [1, 2], reason: "Oligopolies are few dominant firms protected by high barriers, making them mutually interdependent." },
        { id: 44, type: "MSQ", cat: "Macroeconomics", q: "Factors causing a rightward shift in Aggregate Demand (AD): (Select all)", options: ["Significant increase in consumer confidence.", "Central bank raising interest rates.", "Increase in government spending.", "Decrease in exports."], correct: [0, 2], reason: "AD = C + I + G + (X - M). Higher confidence increases C; higher government spending increases G." },
        { id: 45, type: "MSQ", cat: "Business Cycles", q: "During 'Expansion', an economy generally experiences: (Select all)", options: ["Rising Real GDP.", "Increasing cyclical unemployment.", "Increased business investment.", "Downward pressure on wages."], correct: [0, 2], reason: "Expansions feature rising GDP, rising investment, and falling unemployment." },
        { id: 46, type: "MSQ", cat: "Inflation", q: "Groups HURT by unexpectedly high inflation: (Select all)", options: ["Retirees on fixed pensions.", "Homeowners with fixed-rate mortgages.", "Banks with fixed-rate loans.", "Workers with CPI-tied wages."], correct: [0, 2], reason: "Inflation hurts fixed-income earners and lenders who get paid back in depreciated money." },
        { id: 47, type: "MSQ", cat: "Macroeconomics", q: "The Accelerator Principle suggests: (Select all)", options: ["Investment solely determined by interest rates.", "Induced investment is responsive to changes in national income.", "Small demand increase can trigger massive capital investment.", "Government spending crowds out private investment."], correct: [1, 2], reason: "Accelerator effect shows investment depends on the rate of change in output/demand." },
        { id: 48, type: "MSQ", cat: "Costs", q: "Firm experiencing long-run 'Economies of Scale' observes: (Select all)", options: ["Fixed costs remaining zero.", "Long-run ATC decreasing as output increases.", "Advantages from bulk purchasing and specialized management.", "Vertical marginal cost curve."], correct: [1, 2], reason: "Economies of scale lower per-unit costs via bulk buying and operational efficiencies." },

    ];

    let currentIdx = 0;
    let score = 0;
    let userAnswers = {}; // userAnswers[qId] = [selected indices]
    let submitted = {};   // submitted[qId] = true

    function init() {
        const grid = document.getElementById('panel-grid');
        questions.forEach((q, i) => {
            const btn = document.createElement('div');
            btn.className = 'panel-num'; 
            btn.id = 'p-' + i; 
            btn.innerText = q.id;
            btn.onclick = () => { currentIdx = i; render(); };
            grid.appendChild(btn);
        });
        render();
    }

    function applyGlossary(text) {
        let html = text;
        for(let term in glossary) {
            const regex = new RegExp(`\\b${term}\\b`, 'g');
            html = html.replace(regex, `<span class="term-link">${term}<span class="tooltip">${glossary[term]}</span></span>`);
        }
        return html;
    }

    function render() {
        const q = questions[currentIdx];
        
        document.getElementById('category').innerText = `[${q.type}] - ${q.cat}`;
        document.getElementById('question').innerHTML = `<strong>${q.id}.</strong> ` + applyGlossary(q.q);
        
        const optsDiv = document.getElementById('options'); 
        optsDiv.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn'; 
            btn.innerText = String.fromCharCode(65 + i) + ". " + opt; // A. B. C. D. format
            
            if (userAnswers[currentIdx]?.includes(i)) {
                btn.classList.add('selected');
            }
            
            if (submitted[currentIdx]) {
                btn.disabled = true;
                if (q.correct.includes(i)) {
                    btn.classList.add('correct');
                } else if (userAnswers[currentIdx]?.includes(i)) {
                    btn.classList.add('wrong');
                }
            } else {
                btn.onclick = () => toggleSelect(i);
            }
            optsDiv.appendChild(btn);
        });

        // Show/Hide buttons based on state
        const hasSelection = userAnswers[currentIdx] && userAnswers[currentIdx].length > 0;
        document.getElementById('submit-btn').style.display = (hasSelection && !submitted[currentIdx]) ? 'block' : 'none';
        document.getElementById('clear-btn').style.display = (!submitted[currentIdx]) ? 'block' : 'none';
        
        // Show reason
        const rb = document.getElementById('reason-box');
        if (submitted[currentIdx]) {
            rb.style.display = 'block'; 
            document.getElementById('reason-text').innerHTML = applyGlossary(q.reason);
        } else {
            rb.style.display = 'none';
        }

        // Update Panel Navigator Visuals
        document.querySelectorAll('.panel-num').forEach(el => el.classList.remove('active'));
        document.getElementById('p-'+currentIdx).classList.add('active');
    }

    function toggleSelect(i) {
        if (questions[currentIdx].type === 'MSQ') {
            if (!userAnswers[currentIdx]) userAnswers[currentIdx] = [];
            const pos = userAnswers[currentIdx].indexOf(i);
            if (pos > -1) userAnswers[currentIdx].splice(pos, 1);
            else userAnswers[currentIdx].push(i);
        } else {
            userAnswers[currentIdx] = [i]; // Override for MCQ
        }
        render();
    }

    function submitAns() {
        submitted[currentIdx] = true;
        const q = questions[currentIdx];
        
        // Check if correct
        const isCorrect = q.correct.sort().toString() === (userAnswers[currentIdx]||[]).sort().toString();
        
        if (isCorrect) { 
            score++; 
            document.getElementById('score').innerText = score; 
        }
        
        // Colorize right panel RED or GREEN
        const panelBtn = document.getElementById('p-' + currentIdx);
        if(isCorrect) {
            panelBtn.classList.add('correct-panel');
        } else {
            panelBtn.classList.add('wrong-panel');
        }
        
        render();
    }

    function clearResp() { 
        delete userAnswers[currentIdx]; 
        render(); 
    }
    
    function move(dir) {
        let n = currentIdx + dir;
        if(n >= 0 && n < questions.length) { 
            currentIdx = n; 
            render(); 
        }
    }

    function toggleTheme() { 
        document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); 
    }

    function showResults() {
        document.getElementById('dashboard').style.display = 'block';
        const total = questions.length;
        const perc = ((score/total)*100).toFixed(1);
        
        document.getElementById('final-stats').innerText = `${score} / ${total} (${perc}%)`;
        
        const topicMap = {};
        questions.forEach((q, i) => {
            if(!topicMap[q.cat]) topicMap[q.cat] = { correct: 0, total: 0 };
            topicMap[q.cat].total++;
            const ok = submitted[i] && q.correct.sort().toString() === (userAnswers[i]||[]).sort().toString();
            if(ok) topicMap[q.cat].correct++;
        });

        let weakHtml = "";
        for(let cat in topicMap) {
            const p = topicMap[cat].correct / topicMap[cat].total;
            let color = 'var(--secondary)';
            if(p < 0.6) color = 'var(--danger)';
            else if(p < 0.8) color = '#f39c12'; // Orange
            
            weakHtml += `
                <div class="stat-card" style="border-left-color: ${color}">
                    <h4 style="margin:0 0 10px 0;">${cat}</h4>
                    <span style="font-size:1.5rem; font-weight:bold; color:${color}">${(p*100).toFixed(0)}%</span> 
                    <span style="opacity:0.8; margin-left:10px;">(${topicMap[cat].correct}/${topicMap[cat].total} Correct)</span>
                </div>`;
        }
        document.getElementById('weak-areas').innerHTML = weakHtml;
    }

    init();
</script>
</body>
</html>
